<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오후 통합 출석체크</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; padding: 20px; background-color: #f4f7f6; }
        .container { background-color: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 450px; margin: 0 auto; }
        h2 { color: #333; margin-bottom: 10px; }
        .info { font-size: 0.85em; color: #666; background: #fff3cd; padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: left; border-left: 5px solid #ffc107; }
        input, select { width: 100%; padding: 15px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; text-align: center; box-sizing: border-box; }
        .input-group { display: flex; gap: 10px; }
        .input-group input { width: 50%; }
        button { background-color: #007bff; color: white; border: none; padding: 15px 30px; margin-top: 15px; font-size: 18px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        button:disabled { background-color: #aaa; }
        #message { margin-top: 20px; font-weight: bold; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <h2>📱 오후 출석 체크</h2>
    
    <div class="info">
        <b>[출석 체크 시간]</b><br>
        • 1차: 16:30 ~ 18:00<br>
        • 2차: 19:00 ~ 20:30<br>
        • 3차: 20:40 ~ 21:30<br>
        <small>* 출석 외(결석/학원 등)는 학교 밖에서도 제출 가능</small>
    </div>
    
    <select id="classSelect">
        <option value="">-- 반 선택 --</option>
        <option value="1반">1반</option><option value="2반">2반</option>
        <option value="3반">3반</option><option value="4반">4반</option>
        <option value="5반">5반</option><option value="6반">6반</option>
        <option value="7반">7반</option><option value="8반">8반</option>
    </select>

    <div class="input-group">
        <input type="number" id="studentId" placeholder="학번 5자리" inputmode="numeric">
        <input type="text" id="studentName" placeholder="이름">
    </div>
    
    <select id="statusSelect">
        <option value="출석">🔵 정상 출석 (학교 안)</option>
        <option value="결석">🔴 결석 (학교 밖)</option>
        <option value="외출">🟠 외출 (학교 밖)</option>
        <option value="학원">🟣 학원 (학교 밖)</option>
        <option value="조퇴">⚫ 조퇴 (학교 밖)</option>
    </select>

    <button id="checkBtn" onclick="startCheckIn()">정보 제출하기</button>
    <div id="message"></div>
</div>

<script>
    // ★ 1. 새 배포 후 받은 웹 앱 URL을 여기에 붙여넣으세요! ★
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwNxdHzFaKHXQuH5WObQJRvTTQiSoTPrj3GEkdBbLrhamhVq10MdDElzvNf6s0vnL_T/exec";

    // ★ 2. 학교 좌표 (지도를 보고 정확히 넣어주세요) ★
    const SCHOOL_LAT = 36.850000; 
    const SCHOOL_LNG = 127.430000; 
    const ALLOWED_RADIUS = 150; 

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; 
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function startCheckIn() {
        const classNum = document.getElementById("classSelect").value;
        const stdId = document.getElementById("studentId").value.trim();
        const stdName = document.getElementById("studentName").value.trim();
        const userType = document.getElementById("statusSelect").value;
        const msgDiv = document.getElementById("message");
        const btn = document.getElementById("checkBtn");

        if (!classNum) { alert("반을 선택해주세요!"); return; }
        if (stdId.length !== 5) { alert("학번은 5자리 숫자로 입력해주세요!"); return; }
        if (!stdName) { alert("이름을 입력해주세요!"); return; }

        msgDiv.innerText = "위치 확인 중...";
        btn.disabled = true;

        navigator.geolocation.getCurrentPosition(function(pos) {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            const dist = getDistance(SCHOOL_LAT, SCHOOL_LNG, lat, lng);

            if (userType === "출석" && dist > ALLOWED_RADIUS) {
                msgDiv.style.color = "red";
                msgDiv.innerText = `학교 위치를 벗어났습니다! (약 ${Math.round(dist)}m)`;
                btn.disabled = false;
            } else {
                processTimeAndSend(classNum, `${stdId} ${stdName}`, userType, lat, lng);
            }
        }, function() {
            msgDiv.style.color = "red";
            msgDiv.innerText = "GPS 권한이 필요합니다.";
            btn.disabled = false;
        }, {enableHighAccuracy: true});
    }

    function processTimeAndSend(classNum, name, userType, lat, lng) {
        const now = new Date();
        const hour = now.getHours();
        const min = now.getMinutes();
        const currentTime = hour * 60 + min;
        let timeLabel = "시간 외";

        if (currentTime >= (16 * 60 + 30) && currentTime <= (18 * 60)) timeLabel = "오후 1차";
        else if (currentTime >= (19 * 60) && currentTime <= (20 * 60 + 30)) timeLabel = "오후 2차";
        else if (currentTime >= (20 * 60 + 40) && currentTime <= (21 * 60 + 30)) timeLabel = "오후 3차";

        const finalStatus = `${timeLabel} - ${userType}`;
        
        // ★ 반(className) 파라미터를 추가로 보냅니다!
        const url = `${scriptUrl}?className=${encodeURIComponent(classNum)}&name=${encodeURIComponent(name)}&status=${encodeURIComponent(finalStatus)}&lat=${lat}&lng=${lng}`;

        fetch(url, { mode: 'no-cors' }).then(() => {
            document.getElementById("message").style.color = "green";
            document.getElementById("message").innerText = `[${finalStatus}]\n${name} 학생 제출 완료!`;
            document.getElementById("checkBtn").innerText = "제출 완료";
        });
    }
</script>
</body>
</html>
