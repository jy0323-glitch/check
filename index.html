<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학교 통합 출석체크</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; padding: 20px; background-color: #f4f7f6; }
        .container { background-color: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 450px; margin: 0 auto; }
        h2 { color: #333; margin-bottom: 10px; }
        .info { font-size: 0.9em; color: #666; background: #eee; padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: left; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; text-align: center; box-sizing: border-box; }
        button { background-color: #4CAF50; color: white; border: none; padding: 15px 30px; margin-top: 10px; font-size: 18px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        button:disabled { background-color: #aaa; }
        #message { margin-top: 20px; font-weight: bold; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏫 통합 출석 체크</h2>
    
    <div class="info">
        • 오전: ~08:20 (이후 지각)<br>
        • 오후 1차: 16:30 ~ 18:00<br>
        • 오후 2차: 19:00 ~ 20:30<br>
        • 오후 3차: 20:40 ~ 21:30
    </div>
    
    <input type="text" id="studentName" placeholder="학번과 이름 (예: 101 홍길동)">
    
    <select id="statusSelect">
        <option value="출석">🟢 정상 출석 (학교 안)</option>
        <option value="결석">🔴 결석/외출 (학교 밖)</option>
    </select>

    <button id="checkBtn" onclick="startCheckIn()">출석체크 제출하기</button>
    
    <div id="message"></div>
</div>

<script>
    // ★★★ 1. 구글 웹 앱 URL (아까 복사한 것) ★★★
    const scriptUrl = "여기에_구글_웹앱_URL을_붙여넣으세요";

    // ★★★ 2. 학교 위도와 경도 ★★★
    const SCHOOL_LAT = 36.850000; 
    const SCHOOL_LNG = 127.430000; 
    
    const ALLOWED_RADIUS = 150; // 허용 반경 (미터)

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; 
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function startCheckIn() {
        const nameInput = document.getElementById("studentName").value.trim();
        const userType = document.getElementById("statusSelect").value;
        const msgDiv = document.getElementById("message");
        const btn = document.getElementById("checkBtn");

        if (!nameInput) {
            alert("이름을 입력해주세요!");
            return;
        }

        msgDiv.innerText = "GPS 확인 중...";
        btn.disabled = true;

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(pos) {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                const dist = getDistance(SCHOOL_LAT, SCHOOL_LNG, lat, lng);

                // '출석'인데 학교 밖이면 거절
                if (userType === "출석" && dist > ALLOWED_RADIUS) {
                    msgDiv.style.color = "red";
                    msgDiv.innerText = `학교 밖입니다! (약 ${Math.round(dist)}m)\n교실 안에서 다시 시도하세요.`;
                    btn.disabled = false;
                } else {
                    processTimeAndSend(nameInput, userType, lat, lng);
                }
            }, function() {
                msgDiv.innerText = "GPS 권한을 허용해주세요.";
                btn.disabled = false;
            }, {enableHighAccuracy: true});
        }
    }

    function processTimeAndSend(name, userType, lat, lng) {
        const now = new Date();
        const hour = now.getHours();
        const min = now.getMinutes();
        const currentTime = hour * 60 + min; // 현재 시간을 분으로 환산

        let finalStatus = "";

        // 시간대 판별 로직
        if (userType === "결석") {
            finalStatus = "결석/외출 처리";
        } else {
            // 오전: ~08:20
            if (currentTime <= (8 * 60 + 20)) finalStatus = "오전 정상출석";
            else if (currentTime < (16 * 60 + 30)) finalStatus = "오전 지각";
            
            // 오후 1차: 16:30 ~ 18:00
            else if (currentTime >= (16 * 60 + 30) && currentTime <= (18 * 60)) finalStatus = "오후 1차 출석";
            
            // 오후 2차: 19:00 ~ 20:30
            else if (currentTime >= (19 * 60) && currentTime <= (20 * 60 + 30)) finalStatus = "오후 2차 출석";
            
            // 오후 3차: 20:40 ~ 21:30
            else if (currentTime >= (20 * 60 + 40) && currentTime <= (21 * 60 + 30)) finalStatus = "오후 3차 출석";
            
            else finalStatus = "시간 외 제출 (" + hour + ":" + min + ")";
        }

        const url = `${scriptUrl}?name=${encodeURIComponent(name)}&status=${encodeURIComponent(finalStatus)}&lat=${lat}&lng=${lng}`;

        fetch(url, { mode: 'no-cors' }).then(() => {
            document.getElementById("message").style.color = "green";
            document.getElementById("message").innerText = `[${finalStatus}]\n제출 완료되었습니다!`;
            document.getElementById("checkBtn").innerText = "제출 성공";
        });
    }
</script>

</body>
</html>
