<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 진로활동 워크시트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2ec; --surface: #fff; --surface2: #eeebe3;
    --border: #e0dbd0; --border-dark: #c8c0b0;
    --text: #1c1a16; --text2: #6a6358; --text3: #a09880;
    --ink: #1e2d3d; --gold: #b07d2e; --gold-light: #faf4e6;
    --green: #2d5a3d; --green-light: #e8f0eb;
    --blue: #2a4a7f; --blue-light: #eaeff8;
    --purple: #4a3f7a; --purple-light: #edeaf6;
    --radius: 14px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.7; }

  /* 공통 */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ── 이름 선택 화면 ── */
  #screen-pick {
    min-height: 100vh;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    padding: 2rem 1rem;
  }
  #screen-pick.active { display: flex; }

  .emblem {
    width: 60px; height: 60px; background: var(--ink);
    border-radius: 16px; display: flex; align-items: center; justify-content: center;
    font-family: 'Noto Serif KR', serif; font-weight: 700; font-size: 26px; color: var(--gold);
    margin-bottom: 1.5rem;
  }
  .pick-title { font-family: 'Noto Serif KR', serif; font-size: 26px; font-weight: 700; margin-bottom: 6px; text-align: center; }
  .pick-sub { font-size: 13px; color: var(--text3); margin-bottom: 2.5rem; text-align: center; line-height: 1.8; }

  .pick-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 10px; width: 100%; max-width: 580px;
  }
  .pick-card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); padding: 18px 10px; text-align: center;
    cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .pick-card:hover { border-color: var(--gold); background: var(--gold-light); transform: translateY(-2px); box-shadow: 0 4px 14px rgba(176,125,46,0.18); }
  .pick-card:active { transform: scale(0.97); }
  .pick-name { font-family: 'Noto Serif KR', serif; font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .pick-ready { font-size: 11px; color: var(--green); font-weight: 600; }

  /* 로딩 */
  .loading-wrap { text-align: center; padding: 3rem 1rem; }
  .loading-spinner {
    width: 40px; height: 40px; border: 3px solid var(--border);
    border-top-color: var(--gold); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: var(--text2); }

  /* 에러 */
  .error-wrap { text-align: center; padding: 3rem 1rem; }
  .error-icon { font-size: 36px; margin-bottom: 12px; }
  .error-title { font-family: 'Noto Serif KR', serif; font-size: 18px; font-weight: 600; margin-bottom: 6px; }
  .error-desc { font-size: 13px; color: var(--text3); line-height: 1.8; }

  /* ── 결과 화면 ── */
  #screen-result { display: none; min-height: 100vh; }
  #screen-result.active { display: block; }

  .top-bar {
    background: var(--ink); color: #fff; padding: 0 1.5rem; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .top-left { display: flex; align-items: center; gap: 12px; }
  .top-name-wrap .t-name { font-family: 'Noto Serif KR', serif; font-size: 18px; font-weight: 600; }
  .top-name-wrap .t-sub { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 1px; }
  .back-btn {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    color: #fff; border-radius: var(--radius-sm); padding: 7px 14px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    display: flex; align-items: center; gap: 6px; transition: background 0.15s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.2); }

  .tab-bar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; overflow-x: auto; padding: 0 1rem;
    position: sticky; top: 60px; z-index: 99;
  }
  .tab-btn {
    padding: 14px 18px; font-size: 13px; font-weight: 600; color: var(--text3);
    border: none; border-bottom: 2.5px solid transparent;
    background: none; cursor: pointer; white-space: nowrap;
    font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s;
  }
  .tab-btn.active { color: var(--ink); border-bottom-color: var(--gold); }

  .content { max-width: 720px; margin: 0 auto; padding: 1.75rem 1.25rem 5rem; }

  /* 탭 패널 */
  .panel { display: none; animation: fadeIn 0.2s ease; }
  .panel.active { display: block; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem;
  }
  .card-label {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 3px 10px; border-radius: 100px; margin-bottom: 1.25rem;
  }
  .label-gold { background: var(--gold-light); color: var(--gold); border: 1px solid #e0c88a; }
  .label-green { background: var(--green-light); color: var(--green); border: 1px solid #b0cdb8; }
  .label-blue { background: var(--blue-light); color: var(--blue); border: 1px solid #b0c4e8; }
  .label-purple { background: var(--purple-light); color: var(--purple); border: 1px solid #c0b8e8; }

  .block { margin-bottom: 1.25rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border); }
  .block:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .block-label { font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
  .block-text { font-size: 14px; line-height: 1.85; }

  .tag-row { display: flex; flex-wrap: wrap; gap: 7px; }
  .tag { padding: 4px 12px; border-radius: 100px; font-size: 12px; font-weight: 600; border: 1.5px solid; }
  .tag-gold { background: var(--gold-light); color: var(--gold); border-color: #d4a84e; }
  .tag-blue { background: var(--blue-light); color: var(--blue); border-color: #8aa4cc; }
  .tag-ink { background: #e8edf2; color: var(--ink); border-color: #a0b0c0; }

  .activity-item {
    padding: 12px 14px; background: var(--bg); border-radius: var(--radius-sm);
    margin-bottom: 8px; border-left: 3px solid var(--gold);
  }
  .activity-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; flex-wrap: wrap; }

  .ws-block {
    background: var(--bg); border-radius: var(--radius-sm);
    padding: 1rem 1.25rem; margin-bottom: 0.75rem;
    border-left: 3px solid var(--border-dark);
  }
  .ws-block.gold { border-left-color: var(--gold); }
  .ws-block.blue { border-left-color: var(--blue); }
  .ws-title {
    font-size: 13px; font-weight: 700; color: var(--text2);
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  }
  .step-dot {
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
  }
  .dot-gold { background: var(--gold); color: #fff; }
  .dot-blue { background: var(--blue); color: #fff; }
  .ws-content { font-size: 13.5px; line-height: 1.9; }

  .draft-box {
    background: linear-gradient(135deg, #f0ede6 0%, #e8edf2 100%);
    border: 1.5px solid var(--border-dark); border-radius: var(--radius-sm);
    padding: 1.25rem 1.5rem; font-size: 14px; line-height: 1.9;
    color: var(--ink); font-family: 'Noto Serif KR', serif; margin-bottom: 1rem;
  }

  .copy-bar { display: flex; justify-content: flex-end; margin-bottom: 0.75rem; }
  .btn-copy {
    background: var(--surface2); border: 1px solid var(--border-dark);
    color: var(--text2); border-radius: var(--radius-sm); padding: 6px 13px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    display: flex; align-items: center; gap: 5px;
  }
  .btn-copy:hover { background: var(--border); }

  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--ink); color: #fff; padding: 10px 22px; border-radius: var(--radius-sm); font-size: 13px; z-index: 9999; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 480px) {
    .pick-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
    .top-bar { padding: 0 1rem; }
    .tab-btn { padding: 12px 13px; font-size: 12px; }
  }
</style>
</head>
<body>

<!-- 이름 선택 -->
<div id="screen-pick" class="active">
  <div class="emblem">生</div>
  <div class="pick-title">나의 진로활동 워크시트</div>
  <div class="pick-sub" id="pick-sub">이름을 불러오는 중...</div>
  <div id="pick-content">
    <div class="loading-wrap">
      <div class="loading-spinner"></div>
      <div class="loading-text">구글 시트에서 목록을 불러오는 중...</div>
    </div>
  </div>
</div>

<!-- 결과 화면 -->
<div id="screen-result">
  <div class="top-bar">
    <div class="top-left">
      <button class="back-btn" onclick="goBack()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        목록
      </button>
      <div class="top-name-wrap">
        <div class="t-name" id="top-name"></div>
        <div class="t-sub">2학년 진로활동 · 전공 심화 탐구 프로젝트</div>
      </div>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('analysis')">📌 생기부 분석</button>
    <button class="tab-btn" onclick="switchTab('sem1')">📗 1학기 워크시트</button>
    <button class="tab-btn" onclick="switchTab('sem2')">📘 2학기 워크시트</button>
    <button class="tab-btn" onclick="switchTab('draft')">✏️ 생기부 초안</button>
  </div>

  <div class="content">
    <div id="panel-analysis" class="panel active"></div>
    <div id="panel-sem1" class="panel"></div>
    <div id="panel-sem2" class="panel"></div>
    <div id="panel-draft" class="panel"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── 설정 ──
// Apps Script URL을 여기에 입력하세요
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwp4mMfYyVJoNBDQGD8s3SO21Z5BRKjsWa4Xz2hi_QcLRSI8G4T6daTaNWEW5GgCdeb/exec';

// ── utils ──
function toast(msg, dur=2400) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tid); t._tid = setTimeout(() => t.classList.remove('show'), dur);
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function show(id) { document.getElementById(id).classList.add('active'); }
function hide(id) { document.getElementById(id).classList.remove('active'); }

// ── 시작: 이름 목록 불러오기 ──
async function loadNames() {
  try {
    const resp = await fetch(`${GAS_URL}?action=worksheet_list`);
    const data = await resp.json();

    if (!data.success || !data.names?.length) {
      document.getElementById('pick-content').innerHTML = `
        <div class="error-wrap">
          <div class="error-icon">📋</div>
          <div class="error-title">아직 결과가 없습니다</div>
          <div class="error-desc">선생님께서 분석을 완료하고 저장하면<br>여기서 확인할 수 있어요.</div>
        </div>`;
      document.getElementById('pick-sub').textContent = '결과를 기다리는 중';
      return;
    }

    document.getElementById('pick-sub').textContent = '본인 이름을 선택하세요';
    document.getElementById('pick-content').innerHTML = `
      <div class="pick-grid">
        ${data.names.map(name => `
          <div class="pick-card" onclick="openStudent('${esc(name)}')">
            <div class="pick-name">${esc(name)}</div>
            <div class="pick-ready">워크시트 완성 ✓</div>
          </div>`).join('')}
      </div>`;
  } catch(e) {
    document.getElementById('pick-content').innerHTML = `
      <div class="error-wrap">
        <div class="error-icon">⚠️</div>
        <div class="error-title">연결 오류</div>
        <div class="error-desc">${esc(e.message)}<br>인터넷 연결을 확인하거나 선생님께 문의하세요.</div>
      </div>`;
    document.getElementById('pick-sub').textContent = '오류 발생';
  }
}

// ── 학생 결과 열기 ──
async function openStudent(name) {
  document.getElementById('top-name').textContent = name + ' 학생';
  hide('screen-pick');
  document.getElementById('screen-result').classList.add('active');
  document.getElementById('screen-result').style.display = 'block';

  // 로딩 표시
  ['analysis','sem1','sem2','draft'].forEach(tab => {
    document.getElementById('panel-'+tab).innerHTML = `
      <div class="loading-wrap" style="padding:2rem 0;">
        <div class="loading-spinner"></div>
        <div class="loading-text">불러오는 중...</div>
      </div>`;
  });
  switchTab('analysis');
  window.scrollTo(0,0);

  try {
    const resp = await fetch(`${GAS_URL}?action=worksheet&name=${encodeURIComponent(name)}`);
    const data = await resp.json();

    if (!data.success) {
      ['analysis','sem1','sem2','draft'].forEach(tab => {
        document.getElementById('panel-'+tab).innerHTML = `
          <div class="error-wrap">
            <div class="error-icon">😢</div>
            <div class="error-title">${esc(data.message)}</div>
          </div>`;
      });
      return;
    }

    renderResult(data.result);
  } catch(e) {
    document.getElementById('panel-analysis').innerHTML = `
      <div class="error-wrap">
        <div class="error-title">불러오기 실패</div>
        <div class="error-desc">${esc(e.message)}</div>
      </div>`;
  }
}

function goBack() {
  document.getElementById('screen-result').classList.remove('active');
  document.getElementById('screen-result').style.display = 'none';
  show('screen-pick');
  window.scrollTo(0,0);
}

// ── 탭 ──
let activeTab = 'analysis';
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['analysis','sem1','sem2','draft'][i] === tab);
  });
  document.querySelectorAll('.panel').forEach((p, i) => {
    p.classList.toggle('active', ['analysis','sem1','sem2','draft'][i] === tab);
  });
  activeTab = tab;
  window.scrollTo(0,0);
}

// ── 결과 렌더 ──
function renderResult(r) {
  // 분석
  document.getElementById('panel-analysis').innerHTML = `
    <div class="card">
      <span class="card-label label-gold">📌 1학년 생기부 분석</span>
      <div class="copy-bar"><button class="btn-copy" onclick="copyPanel('panel-analysis')">복사</button></div>
      <div class="block">
        <div class="block-label">반복 키워드</div>
        <div class="tag-row">${(r.keywords||[]).map(k=>`<span class="tag tag-gold">${esc(k)}</span>`).join('')}</div>
      </div>
      <div class="block">
        <div class="block-label">주요 활동</div>
        ${(r.activities||[]).map(a=>`
          <div class="activity-item">
            <div class="activity-meta">
              <span class="tag tag-ink" style="font-size:11px;">${esc(a.subject||'')}</span>
              ${a.type?`<span style="font-size:11px;color:var(--text3);">${esc(a.type)}</span>`:''}
            </div>
            <div class="block-text">${esc(a.desc)}</div>
          </div>`).join('')}
      </div>
      <div class="block">
        <div class="block-label">강점</div>
        <div class="block-text">${esc(r.strengths||'')}</div>
      </div>
      <div class="block">
        <div class="block-label">성장 가능 영역</div>
        <div class="block-text">${esc(r.weaknesses||'')}</div>
      </div>
      <div class="block">
        <div class="block-label">진로 방향</div>
        <div class="tag-row" style="margin-bottom:10px;">${(r.career_directions||[]).map(c=>`<span class="tag tag-blue">${esc(c)}</span>`).join('')}</div>
        <div class="block-text">${esc(r.career_analysis||'')}</div>
      </div>
    </div>`;

  // 1학기
  document.getElementById('panel-sem1').innerHTML = `
    <div class="card">
      <span class="card-label label-green">📗 1학기 · 전공 심화 탐구 (이론편)</span>
      <div class="copy-bar"><button class="btn-copy" onclick="copyPanel('panel-sem1')">복사</button></div>
      ${(r.sem1||[]).map((step,i)=>`
        <div class="ws-block gold">
          <div class="ws-title"><span class="step-dot dot-gold">${i+1}</span>${esc(step.title)}</div>
          <div class="ws-content">${esc(step.content).replace(/\n/g,'<br>').replace(/[①②③④⑤]/g,s=>`<strong>${s}</strong>`)}</div>
        </div>`).join('')}
    </div>`;

  // 2학기
  document.getElementById('panel-sem2').innerHTML = `
    <div class="card">
      <span class="card-label label-blue">📘 2학기 · 전공 심화 탐구 (실전편)</span>
      <div class="copy-bar"><button class="btn-copy" onclick="copyPanel('panel-sem2')">복사</button></div>
      ${(r.sem2||[]).map((step,i)=>`
        <div class="ws-block blue">
          <div class="ws-title"><span class="step-dot dot-blue">${i+1}</span>${esc(step.title)}</div>
          <div class="ws-content">${esc(step.content).replace(/\n/g,'<br>').replace(/[①②③④⑤]/g,s=>`<strong>${s}</strong>`)}</div>
        </div>`).join('')}
    </div>`;

  // 초안
  document.getElementById('panel-draft').innerHTML = `
    <div class="card">
      <span class="card-label label-purple">✏️ 진로활동 생기부 예시 초안</span>
      <div class="copy-bar"><button class="btn-copy" onclick="copyPanel('panel-draft')">복사</button></div>
      <div style="font-size:12px;font-weight:700;color:var(--text3);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:8px;">1학기</div>
      <div class="draft-box">${esc(r.draft_sem1||'')}</div>
      <div style="font-size:12px;font-weight:700;color:var(--text3);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:8px;margin-top:1.25rem;">2학기</div>
      <div class="draft-box">${esc(r.draft_sem2||'')}</div>
    </div>`;
}

function copyPanel(id) {
  const el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.innerText).then(() => toast('복사됐어요!'));
}

// ── 시작 ──
loadNames();
</script>
</body>
</html>
